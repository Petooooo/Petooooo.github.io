backend:
  name: github
  repo: Petooooo/Petooooo.github.io
  branch: main

local_backend: true
media_folder: "apps/web/public/uploads"
public_folder: "/uploads"
publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "projects"
    label: "Projects"
    folder: "apps/web/src/content/projects"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: &project_fields
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Updated", name: "updated", widget: "datetime", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - label: "Content Type"
        name: "contentType"
        widget: "select"
        required: false
        options: &content_type_options
          - "troubleshooting-log"
          - "terminal-log"
          - "deployment-note"
          - "implementation-note"
          - "algorithm-study"
          - "system-design"
          - "infrastructure-decision"
          - "debugging-note"
          - "experiment-note"
          - "paper-review"
          - "engineering-observation"
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Auto Generated", name: "autoGenerated", widget: "boolean", default: false }
      - { label: "Generated At", name: "generatedAt", widget: "datetime", required: false }
      - { label: "Reviewed", name: "reviewed", widget: "boolean", default: true }
      - { label: "Review Status", name: "reviewStatus", widget: "select", options: ["needs-review", "in-review", "reviewed"], default: "reviewed" }
      - { label: "Source", name: "source", widget: "string", required: false }
      - { label: "Source URL", name: "sourceUrl", widget: "string", required: false }
      - { label: "Source Kind", name: "sourceKind", widget: "select", required: false, options: ["raw-note", "terminal-log", "git-diff", "deployment-log", "study-note", "manual"] }
      - { label: "Sensitivity", name: "sensitivity", widget: "select", options: ["public", "sanitized", "private-source"], default: "public" }
      - { label: "Tech Stack", name: "techStack", widget: "list", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Reading Time", name: "readingTime", widget: "string", required: false }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Period", name: "period", widget: "string" }
      - { label: "GitHub URL", name: "githubUrl", widget: "string", required: false }
      - { label: "External URL", name: "externalUrl", widget: "string", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["planned", "building", "active", "archived"] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "notes"
    label: "Notes"
    folder: "apps/web/src/content/notes"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: &post_fields
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Updated", name: "updated", widget: "datetime", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Content Type", name: "contentType", widget: "select", required: false, options: *content_type_options }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Auto Generated", name: "autoGenerated", widget: "boolean", default: false }
      - { label: "Generated At", name: "generatedAt", widget: "datetime", required: false }
      - { label: "Reviewed", name: "reviewed", widget: "boolean", default: true }
      - { label: "Review Status", name: "reviewStatus", widget: "select", options: ["needs-review", "in-review", "reviewed"], default: "reviewed" }
      - { label: "Source", name: "source", widget: "string", required: false }
      - { label: "Source URL", name: "sourceUrl", widget: "string", required: false }
      - { label: "Source Kind", name: "sourceKind", widget: "select", required: false, options: ["raw-note", "terminal-log", "git-diff", "deployment-log", "study-note", "manual"] }
      - { label: "Sensitivity", name: "sensitivity", widget: "select", options: ["public", "sanitized", "private-source"], default: "public" }
      - { label: "Tech Stack", name: "techStack", widget: "list", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Reading Time", name: "readingTime", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "devops"
    label: "DevOps Logs"
    folder: "apps/web/src/content/devops"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *post_fields

  - name: "research"
    label: "Research"
    folder: "apps/web/src/content/research"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *post_fields

  - name: "auto-archive"
    label: "Archive"
    folder: "apps/web/src/content/auto-archive"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *post_fields
